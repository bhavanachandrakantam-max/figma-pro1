<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma Project | Interactive Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', Inter, -apple-system, sans-serif;
      background: #0a0c15;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      background: rgba(18, 20, 28, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.9rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 20;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 650;
      background: linear-gradient(135deg, #ffffff, #cbd5e6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .project-badge {
      background: linear-gradient(135deg, #19b394, #0f7c62);
      color: white;
      font-size: 0.7rem;
      padding: 0.25rem 0.85rem;
      border-radius: 40px;
    }

    .btn-open-figma {
      background: #1a1e2c;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.65rem 1.8rem;
      border-radius: 48px;
      font-weight: 600;
      color: #f0f3fa;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-open-figma:hover {
      background: #2a2f42;
      transform: translateY(-2px);
    }

    .iframe-container {
      flex: 1;
      position: relative;
      width: 100%;
      background: #0f111a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .figma-embed-wrapper {
      width: 100%;
      max-width: 1200px;
      height: 100%;
      max-height: calc(100vh - 80px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .fallback-message {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      color: #ffaa66;
      font-size: 0.75rem;
      padding: 8px 16px;
      border-radius: 40px;
      font-family: monospace;
      z-index: 25;
    }

    .fallback-message a {
      color: #19b394;
      text-decoration: none;
    }

    @media (max-width: 680px) {
      .app-header {
        padding: 0.7rem 1.2rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .btn-open-figma {
        padding: 0.5rem 1.2rem;
        font-size: 0.8rem;
      }
      .iframe-container {
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div style="display: flex; align-items: baseline; gap: 0.75rem;">
    <span class="project-badge">🎯 INTERACTIVE PROTOTYPE</span>
    <h1>🎨 Figma Project</h1>
  </div>
  <button class="btn-open-figma" id="openFigmaBtn">
    <span>✨</span> Open in Figma <span>↗</span>
  </button>
</div>

<div class="iframe-container">
  <div class="figma-embed-wrapper">
    <iframe 
      src="https://embed.figma.com/proto/K8c8JVpx1SK1Ge9XPZDuES/Untitled?node-id=66-2&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A2&embed-host=share"
      title="Figma Project Prototype"
      allowfullscreen
      sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox allow-forms allow-modals"
      allow="fullscreen; clipboard-read; clipboard-write">
    </iframe>
  </div>
  <div class="fallback-message">
    ⚠️ If prototype doesn't load → <a href="https://www.figma.com/proto/K8c8JVpx1SK1Ge9XPZDuES/Untitled?node-id=66-2&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A2" target="_blank">Open directly in Figma</a>
  </div>
</div>

<script>
  document.getElementById('openFigmaBtn').addEventListener('click', function() {
    window.open('https://www.figma.com/proto/K8c8JVpx1SK1Ge9XPZDuES/Untitled?node-id=66-2&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A2', '_blank');
  });
</script>
</body>
</html>
